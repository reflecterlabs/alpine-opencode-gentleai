name = "opencode-gentle-ai"
main = "src/index.ts"
compatibility_date = "2025-06-25"
compatibility_flags = ["nodejs_compat"]

[vars]
TERMINAL_URL = ""  # Set via wrangler secret put TERMINAL_URL
VM_ID = ""        # Set via wrangler secret put VM_ID
